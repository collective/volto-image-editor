name: 'Main CI'

on:
  push:
  workflow_dispatch:

jobs:
  config:
    name: 'Config: Compute values used in workflow'
    uses: ./.github/workflows/config.yml

  code-analysis:
    name: 'Code analysis checks'
    uses: plone/meta/.github/workflows/frontend-code.yml@2.x
    needs:
      - config
    with:
      node-version: ${{ needs.config.outputs.node-version }}

  unit:
    name: 'Run unit tests'
    uses: plone/meta/.github/workflows/frontend-unit.yml@2.x
    needs:
      - config
    with:
      node-version: ${{ needs.config.outputs.node-version }}

  i18n:
    name: 'Run i18n checks'
    uses: plone/meta/.github/workflows/frontend-i18n.yml@2.x
    needs:
      - config
    with:
      node-version: ${{ needs.config.outputs.node-version }}

  storybook:
    name: 'Storybook'
    uses: plone/meta/.github/workflows/frontend-storybook.yml@2.x
    needs:
      - config
      - code-analysis
      - unit
      - i18n
    with:
      node-version: ${{ needs.config.outputs.node-version }}
      deploy: true

  acceptance:
    name: 'Run acceptance tests'
    runs-on: ubuntu-latest
    needs:
      - config
      - code-analysis
      - unit
      - i18n
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.config.outputs.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Volto workspace dependencies
        run: make build-deps

      - name: Start acceptance backend
        run: docker run -d --name backend -p 55001:55001 plone/server-acceptance:6

      - name: Wait for backend
        run: pnpm dlx wait-on http://127.0.0.1:55001/plone

      - name: Start acceptance frontend
        run: |
          nohup make acceptance-frontend-dev-start > /tmp/frontend.log 2>&1 &

      - name: Wait for frontend
        run: pnpm dlx wait-on http://127.0.0.1:3000

      - name: Run acceptance tests
        run: make ci-acceptance-test

      - name: Backend logs on failure
        if: ${{ failure() }}
        run: docker logs backend

      - name: Frontend logs on failure
        if: ${{ failure() }}
        run: cat /tmp/frontend.log

      - name: Stop backend
        if: ${{ always() }}
        run: docker rm -f backend

  report:
    name: 'Final report'
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - config
      - code-analysis
      - unit
      - i18n
      - storybook
      - acceptance
    steps:
      - name: Write report
        run: |
          echo '# Workflow Report' >> $GITHUB_STEP_SUMMARY
          echo '| Job ID | Conclusion |' >> $GITHUB_STEP_SUMMARY
          echo '| --- | --- |' >> $GITHUB_STEP_SUMMARY
          echo '| config | ${{ needs.config.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| code-analysis | ${{ needs.code-analysis.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| unit | ${{ needs.unit.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| i18n | ${{ needs.i18n.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| storybook | ${{ needs.storybook.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| acceptance | ${{ needs.acceptance.result }} |' >> $GITHUB_STEP_SUMMARY
